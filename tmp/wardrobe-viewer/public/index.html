<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ropero</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Ropero</h1>
        <p>Prendas y outfits guardados en Notion, con las fotos al frente.</p>
      </div>
      <button id="reloadBtn">Actualizar</button>
    </header>

    <nav class="view-tabs" aria-label="Vistas">
      <button class="view-tab active" type="button" data-view="wardrobe">Prendas</button>
      <button class="view-tab" type="button" data-view="outfits">Outfits</button>
    </nav>

    <section class="filters">
      <input id="searchInput" type="search" placeholder="Buscar por nombre, marca, talle, color..." />
      <select id="statusFilter">
        <option value="">Todos los estados</option>
      </select>
      <select id="categoryFilter">
        <option value="">Todas las tiendas</option>
      </select>
    </section>

    <section id="summary" class="summary"></section>
    <main id="grid" class="grid"></main>

    <template id="cardTpl">
      <article class="card">
        <img class="card-image" alt="" loading="lazy" />
        <div class="card-body">
          <div class="card-head">
            <h2 class="card-title"></h2>
            <a class="card-link" target="_blank" rel="noreferrer">Abrir en Notion</a>
          </div>
          <p class="card-description"></p>
          <div class="card-actions"></div>
          <dl class="meta"></dl>
          <div class="thumbs"></div>
        </div>
      </article>
    </template>

    <template id="outfitTpl">
      <article class="outfit-card">
        <div class="outfit-carousel">
          <img class="outfit-image" alt="" loading="lazy" />
          <button class="carousel-btn carousel-prev" type="button" aria-label="Foto anterior">‹</button>
          <button class="carousel-btn carousel-next" type="button" aria-label="Foto siguiente">›</button>
          <span class="photo-count"></span>
        </div>
        <div class="outfit-body">
          <div class="card-head">
            <h2 class="card-title"></h2>
            <a class="card-link" target="_blank" rel="noreferrer">Abrir en Notion</a>
          </div>
          <p class="card-description"></p>
          <div class="tag-row"></div>
          <dl class="meta"></dl>
          <div class="carousel-dots"></div>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
